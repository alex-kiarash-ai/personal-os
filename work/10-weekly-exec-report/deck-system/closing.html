<!-- @dsCard group="Exec Deck" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<title>Closing</title>
<style>
  :root{--ink:#001219;--teal:#005f73;--cyan:#0a9396;--aqua:#94d2bd;--custard:#e9d8a6;--orange:#ee9b00;--elev:#00232e}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{font-family:Calibri,"Segoe UI",system-ui,-apple-system,sans-serif}
  .slide{position:relative;width:1280px;height:720px;background:var(--ink);color:#fff;overflow:hidden;padding:80px;display:flex;flex-direction:column;justify-content:center}
  .slide::before{content:"";position:absolute;top:-240px;left:-180px;width:720px;height:720px;
    background:radial-gradient(circle,rgba(0,95,115,.5) 0%,rgba(0,18,25,0) 62%);pointer-events:none}
  .logo{height:44px;margin-bottom:44px;align-self:flex-start}
  .big{font-size:52px;font-weight:700;line-height:1.12;max-width:960px;letter-spacing:-.4px}
  .big em{color:var(--orange);font-style:normal}
  .next{margin-top:36px;background:var(--elev);border:1px solid rgba(148,210,189,.16);border-radius:14px;padding:24px 30px;max-width:820px}
  .next .nl{color:var(--aqua);font-size:19px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
  .next .nt{font-size:26px;line-height:1.4}
  .foot{position:absolute;bottom:52px;left:80px;color:var(--aqua);font-size:18px}
  .foot b{color:#fff;font-weight:600}
</style></head>
<body>
  <div class="slide">
    <img class="logo" src="alex-logo-transparent.png" alt="ALEX">
    <div class="big">{{closing_line}}</div>
    <div class="next">
      <div class="nl">Next week</div>
      <div class="nt">{{next_focus}}</div>
    </div>
    <div class="foot">Built by <b>Alex</b> &nbsp;·&nbsp; {{date}}</div>
  </div>
</body></html>
