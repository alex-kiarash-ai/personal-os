<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* COLORS: exact EP2 (episode-02-architecture) palette. Design/layout = EP3 unchanged. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:1320px; overflow:hidden; }
  :root{ --cyan:#3ce1f1; --violet:#9a8bff; --coral:#F2A07A; --ink:#EAF0FF; --muted:#8e99bf; }
  body { position:relative; font-family:'Hanken Grotesk','Segoe UI',sans-serif; color:var(--ink);
    background:
      radial-gradient(900px 760px at 28% 22%, rgba(15,111,184,0.22), transparent 60%),
      radial-gradient(960px 880px at 78% 82%, rgba(106,61,240,0.22), transparent 62%),
      radial-gradient(620px 560px at 50% 56%, rgba(242,160,122,0.09), transparent 60%),
      radial-gradient(circle at 50% 50%, #18234f 0%, #0c1232 40%, #070a1d 72%, #04050f 100%); }
  .grain { position:absolute; inset:0; opacity:.06; mix-blend-mode:soft-light; pointer-events:none; }
  .vign { position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 46%, transparent 52%, rgba(4,5,15,0.55) 100%); }
  svg.links { position:absolute; inset:0; width:1200px; height:1320px; }

  .title { position:absolute; left:600px; top:50px; transform:translateX(-50%); text-align:center; width:100%; }
  .title .k { font-family:'Sora',sans-serif; font-size:27px; letter-spacing:13px; font-weight:700; padding-left:13px;
    background:linear-gradient(90deg,#15d6e8,#9a8bff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .title .sub { font-size:17.5px; letter-spacing:.6px; color:#8e99bf; margin-top:13px; font-weight:400; }

  .node { position:absolute; transform:translate(-50%,-50%); }
  .card { position:relative; width:308px; min-height:116px; border-radius:22px; padding:16px 22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(158deg, rgba(24,35,79,0.55), rgba(12,18,50,0.42)) padding-box,
              linear-gradient(140deg, rgba(60,225,241,0.70), rgba(154,139,255,0.50) 60%, rgba(154,139,255,0.42)) border-box;
    border:1.4px solid transparent; backdrop-filter:blur(9px);
    box-shadow:0 22px 54px rgba(8,11,36,0.50), 0 0 40px rgba(18,204,221,0.10), inset 0 1px 0 rgba(255,255,255,0.14); }
  .hd { display:flex; align-items:center; justify-content:center; gap:12px; }
  .ic { width:34px; height:34px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex:none;
    background:linear-gradient(150deg, rgba(60,225,241,0.20), rgba(154,139,255,0.14));
    box-shadow:inset 0 0 0 1px rgba(180,210,255,0.22), 0 0 16px rgba(18,204,221,0.18); }
  .ic svg { width:20px; height:20px; }
  .t { font-family:'Sora',sans-serif; font-weight:600; font-size:23px; color:#F4F7FF; letter-spacing:.2px; white-space:nowrap; }
  .s { font-size:16.5px; color:#aab4d6; margin-top:9px; font-weight:400; line-height:1.34; text-align:center; }

  .core { left:600px; top:724px; }
  .bloom { position:absolute; left:0; top:0; transform:translate(-50%,-50%); width:560px; height:560px; border-radius:50%;
    background:radial-gradient(circle, rgba(242,160,122,0.28) 0%, rgba(18,204,221,0.26) 34%, rgba(124,92,255,0.22) 56%, rgba(6,8,26,0) 72%); filter:blur(9px); }
  .orb { position:absolute; left:0; top:0; transform:translate(-50%,-50%); width:244px; height:244px; border-radius:50%;
    background:
      radial-gradient(circle at 50% 36%, rgba(242,160,122,0.28), transparent 42%),
      radial-gradient(circle at 50% 60%, rgba(124,92,255,0.30), transparent 55%),
      radial-gradient(circle at 50% 48%, #28335f, #0b1030 80%);
    border:1.6px solid transparent;
    box-shadow:0 0 96px rgba(18,204,221,0.40), 0 0 50px rgba(242,160,122,0.28), inset 0 0 70px rgba(124,92,255,0.26), inset 0 2px 2px rgba(255,255,255,0.16);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
  .orb .n { font-family:'Sora',sans-serif; font-size:46px; font-weight:800; letter-spacing:.5px; line-height:1;
    background:linear-gradient(92deg,#2ee0ee,#b0a2ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 34px rgba(46,224,238,0.30); }
  .orb .c { font-family:'Sora',sans-serif; font-size:12px; letter-spacing:4px; color:#93a0c8; font-weight:500; }
</style></head><body>
  <svg class="grain"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="1200" height="1320" filter="url(#noise)"/></svg>

  <svg class="links" viewBox="0 0 1200 1320">
    <defs>
      <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="120" y1="120" x2="1080" y2="1200">
        <stop offset="0" stop-color="#3ce1f1"/><stop offset="1" stop-color="#9a8bff"/>
      </linearGradient>
      <marker id="ah" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#43e6f4"/></marker>
      <filter id="lglow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="4.2" flood-color="#15d6e8" flood-opacity="0.8"/></filter>
    </defs>

    <circle cx="600" cy="724" r="158" fill="none" stroke="rgba(120,160,255,0.16)" stroke-width="1.3"/>
    <circle cx="600" cy="724" r="196" fill="none" stroke="rgba(120,160,255,0.08)" stroke-width="1.1" stroke-dasharray="2 9"/>
    <circle cx="600" cy="724" r="232" fill="none" stroke="rgba(120,160,255,0.05)" stroke-width="1"/>

    <g fill="none" stroke="url(#flow)" stroke-width="3" marker-end="url(#ah)" filter="url(#lglow)" stroke-linecap="round">
      <path d="M600,286 C600,304 600,314 600,330"/>
      <path d="M600,446 C600,512 582,562 600,604"/>
      <path d="M376,726 C434,740 434,726 482,725"/>
      <path d="M824,726 C766,740 766,726 718,725"/>
      <path d="M600,1090 C600,994 620,918 600,846"/>
    </g>
    <g fill="#43e6f4">
      <circle cx="600" cy="606" r="5"/><circle cx="484" cy="725" r="5"/>
      <circle cx="716" cy="725" r="5"/><circle cx="600" cy="844" r="5"/>
    </g>
    <g fill="rgba(140,205,245,0.55)">
      <circle cx="600" cy="502" r="2.4"/><circle cx="600" cy="562" r="2"/>
      <circle cx="432" cy="730" r="2.4"/><circle cx="768" cy="730" r="2.4"/>
      <circle cx="600" cy="980" r="2.4"/><circle cx="600" cy="918" r="2"/>
    </g>
  </svg>

  <div class="title"><div class="k">ALEX&rsquo;S BRAIN</div><div class="sub">what he knows, and what he can do, all on files I own</div></div>

  <div class="node" style="left:600px; top:228px;">
    <div class="card"><div class="hd"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#9a8bff" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2 L20 9 L15 22 L9 22 L4 9 Z"/><path d="M12 2 L12 22 M4 9 L20 9"/></svg></span><div class="t">Obsidian</div></div><div class="s">the graph, I see the brain</div></div>
  </div>
  <div class="node" style="left:600px; top:388px;">
    <div class="card"><div class="hd"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#3ce1f1" stroke-width="1.8" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="12" cy="12" r="3.1"/><path d="M12 8.9 L12 7 M12 17 L12 15.1 M8.9 12 L7 12 M17 12 L15.1 12"/></svg></span><div class="t">Vault</div></div><div class="s">a private Wikipedia of my life</div></div>
  </div>

  <div class="node" style="left:218px; top:724px;">
    <div class="card"><div class="hd"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#9a8bff" stroke-width="1.8" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8 L16 8 M8 12 L16 12 M8 16 L13 16"/></svg></span><div class="t">Notion</div></div><div class="s">trackers, databases, dashboards</div></div>
  </div>

  <div class="node" style="left:982px; top:724px;">
    <div class="card"><div class="hd"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#3ce1f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 6.5 a3.5 3.5 0 0 0-4.7 4.4 L4 16.7 L7.3 20 L13.1 14.2 a3.5 3.5 0 0 0 4.4-4.7 L15 12 L12 9 Z"/></svg></span><div class="t">Workshop</div></div><div class="s">automations I teach him</div></div>
  </div>

  <div class="node" style="left:600px; top:1150px;">
    <div class="card"><div class="hd"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#9a8bff" stroke-width="1.8" stroke-linejoin="round"><path d="M9 3 h6 v3 a2 2 0 0 0 4 0 V3 M9 3 v3 a2 2 0 0 1-4 0 M5 6 v6 h3 a2 2 0 0 1 0 4 H5 v5 h14 V6"/></svg></span><div class="t">Skills &amp; Plugins</div></div><div class="s">research, presentations, voice, logos</div></div>
  </div>

  <div class="node core">
    <div class="bloom"></div>
    <div class="orb">
      <svg width="70" height="70" viewBox="0 0 96 96" style="margin-top:2px;">
        <g stroke="#F2A07A" stroke-width="7.5" stroke-linecap="round" transform="translate(48,48)">
          <line x1="0" y1="-32" x2="0" y2="-12"/>
          <g transform="rotate(30)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(60)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(90)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(120)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(150)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(180)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(210)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(240)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(270)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(300)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
          <g transform="rotate(330)"><line x1="0" y1="-32" x2="0" y2="-12"/></g>
        </g>
      </svg>
      <div class="n">Alex</div>
      <div class="c">THE BRAIN</div>
    </div>
  </div>

  <div class="vign"></div>
</body></html>
